  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --navy: #0B1524;
      --navy-mid: #132035;
      --navy-light: #1E3050;
      --slate: #8BA4BF;
      --text: #F0EDE8;
      --text-muted: #8BA4BF;
      --border: rgba(201,168,76,0.2);
      --border-light: rgba(255,255,255,0.08);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--navy); color: var(--text); line-height: 1.6; }
    #root { min-height: 100vh; }

    /* ── LOADING SCREEN ── */
    #app-loader { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
    #app-loader svg { animation: pulse-shield 2s ease-in-out infinite; }
    #app-loader p { margin-top: 1.2rem; font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); }
    @keyframes pulse-shield { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }

    /* ── GLOBAL RESET EXTRAS ── */
    button { font-family: 'Jost', sans-serif; cursor: pointer; }
    input, textarea, select { font-family: 'Jost', sans-serif; }
    a { text-decoration: none; }

    /* ── NAV ── */
    nav.site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: rgba(11,21,36,0.93); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
    .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; letter-spacing: 0.05em; color: var(--text); }
    .nav-links { display: flex; align-items: center; gap: 2.2rem; }
    .nav-links a { font-size: 0.75rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }
    .nav-cta { padding: 8px 20px; border: 1px solid var(--gold); color: var(--gold); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; background: transparent; transition: all 0.2s; }
    .nav-cta:hover { background: var(--gold); color: var(--navy); }
    .nav-hamburger { display: none; background: none; border: none; flex-direction: column; gap: 5px; padding: 4px; }
    .nav-hamburger span { display: block; width: 22px; height: 1.5px; background: var(--text); transition: all 0.3s; }
    .nav-mobile { display: none; background: var(--navy-mid); border-top: 1px solid var(--border); padding: 1rem 2rem; flex-direction: column; gap: 1rem; }
    .nav-mobile a { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; }
    .nav-mobile a:hover { color: var(--gold); }

    /* ── HERO ── */
    .hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 72px; }
    .hero-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0B1524 0%, #132035 55%, #0f1e34 100%); }
    .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(201,168,76,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.05) 1px, transparent 1px); background-size: 60px 60px; }
    .hero-corner { position: absolute; top: 100px; right: 5%; opacity: 0.06; font-family: 'Cormorant Garamond', serif; font-size: 18vw; font-weight: 700; color: var(--gold); user-select: none; line-height: 1; }
    .hero-inner { position: relative; max-width: 1280px; margin: 0 auto; padding: 5rem 2rem; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 4rem; align-items: center; width: 100%; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border: 1px solid var(--border); font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
    .hero-tagline { font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; }
    .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem, 5vw, 4.8rem); font-weight: 600; line-height: 1.04; margin-bottom: 1.2rem; }
    .hero-title em { font-style: italic; color: var(--gold); display: block; }
    .hero-desc { font-size: 0.98rem; line-height: 1.75; color: var(--text-muted); margin-bottom: 2.5rem; font-weight: 300; max-width: 480px; }
    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-primary { padding: 14px 32px; background: var(--gold); color: var(--navy); font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; border: none; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline { padding: 14px 32px; background: transparent; color: var(--text); font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; border: 1px solid var(--border-light); transition: all 0.2s; }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .hero-visual { display: flex; justify-content: center; align-items: center; }
    .shield-svg { width: 100%; max-width: 300px; filter: drop-shadow(0 0 50px rgba(201,168,76,0.12)); animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

    /* ── STATS ── */
    .stats-bar { background: var(--navy-mid); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .stats-inner { max-width: 1280px; margin: 0 auto; padding: 1rem 2rem; display: grid; grid-template-columns: repeat(4, 1fr); }
    .stat-item { text-align: center; padding: 1.8rem 1rem; border-right: 1px solid var(--border-light); }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 6px; }

    /* ── SECTIONS ── */
    .section { padding: 6rem 2rem; }
    .section-alt { background: var(--navy-mid); }
    .section-inner { max-width: 1280px; margin: 0 auto; }
    .section-tag { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 600; line-height: 1.1; margin-bottom: 1.5rem; }
    .section-title span { color: var(--gold); font-style: italic; }
    .section-desc { color: var(--text-muted); font-size: 0.92rem; line-height: 1.75; font-weight: 300; max-width: 520px; }

    /* ── SERVICES ── */
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5px; background: var(--border); margin-top: 4rem; }
    .service-card { background: var(--navy); padding: 2.5rem; position: relative; overflow: hidden; transition: background 0.3s; }
    .service-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--gold); transform: scaleX(0); transition: transform 0.3s; transform-origin: left; }
    .service-card:hover { background: var(--navy-mid); }
    .service-card:hover::after { transform: scaleX(1); }
    .service-icon { font-size: 2rem; margin-bottom: 1.4rem; display: block; }
    .service-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 0.75rem; }
    .service-desc { font-size: 0.83rem; line-height: 1.75; color: var(--text-muted); font-weight: 300; }

    /* ── ABOUT ── */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    .about-text p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.8; margin-bottom: 1.4rem; font-weight: 300; }
    .about-certs { display: flex; gap: 2.5rem; margin-top: 1.5rem; }
    .cert-item .cert-name { color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 700; }
    .cert-item .cert-label { font-size: 0.65rem; letter-spacing: 0.08em; color: var(--text-muted); margin-top: 3px; }
    .about-values { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
    .value-item { background: var(--navy-mid); padding: 1.4rem 1.6rem; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; transition: background 0.2s; }
    .value-item:hover { background: var(--navy-light); }
    .value-arrow { color: var(--gold); font-size: 0.75rem; }

    /* ── CONTACT ── */
    .contact-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 5rem; }
    .contact-info-item { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: flex-start; }
    .contact-icon { font-size: 1.1rem; margin-top: 2px; flex-shrink: 0; }
    .contact-label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 3px; }
    .contact-val { font-size: 0.88rem; color: var(--text-muted); }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-light);
      padding: 11px 14px; color: var(--text); font-size: 0.88rem; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); }
    .form-group textarea { height: 120px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-msg { font-size: 0.8rem; margin-top: 0.6rem; padding: 8px 12px; }
    .form-msg.success { color: #4CAF50; background: rgba(76,175,80,0.08); border: 1px solid rgba(76,175,80,0.2); }
    .form-msg.error { color: #f44336; background: rgba(244,67,54,0.08); border: 1px solid rgba(244,67,54,0.2); }

    /* ── FOOTER ── */
    footer { background: #060d17; border-top: 1px solid var(--border); padding: 4rem 2rem 2rem; }
    .footer-grid { max-width: 1280px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 3rem; margin-bottom: 3rem; }
    .footer-brand-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; color: var(--text); }
    .footer-brand p { font-size: 0.82rem; line-height: 1.7; color: var(--text-muted); font-weight: 300; margin-top: 1rem; }
    .footer-col h4 { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.25rem; }
    .footer-col a { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.65rem; cursor: pointer; transition: color 0.2s; }
    .footer-col a:hover { color: var(--text); }
    .footer-bottom { max-width: 1280px; margin: 0 auto; padding-top: 2rem; border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .footer-copy { font-size: 0.72rem; color: var(--text-muted); }
    .admin-trigger { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); background: transparent; border: 1px solid var(--border-light); padding: 6px 14px; transition: all 0.2s; }
    .admin-trigger:hover { color: var(--gold); border-color: var(--border); }

    /* ── ADMIN LAYOUT ── */
    .admin-wrap { display: flex; min-height: 100vh; background: #070e1a; }
    .sidebar { width: 260px; background: var(--navy); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; overflow-y: auto; z-index: 50; }
    .sidebar-logo { padding: 1.5rem; border-bottom: 1px solid var(--border); }
    .sidebar-logo .s-brand { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; letter-spacing: 0.04em; }
    .sidebar-logo .s-sub { font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text-muted); margin-top: 3px; }
    .sidebar-nav { padding: 0.75rem 0; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 1.5rem; font-size: 0.83rem; color: var(--text-muted); cursor: pointer; transition: all 0.2s; border-left: 2px solid transparent; }
    .nav-item:hover { background: rgba(201,168,76,0.04); color: var(--text); }
    .nav-item.active { background: rgba(201,168,76,0.08); color: var(--gold); border-left-color: var(--gold); }
    .nav-badge { margin-left: auto; background: rgba(201,168,76,0.15); color: var(--gold); font-size: 0.62rem; padding: 2px 7px; border-radius: 3px; }
    .sidebar-footer { padding: 1.5rem; border-top: 1px solid var(--border); }
    .admin-main { margin-left: 260px; flex: 1; padding: 2.5rem; min-height: 100vh; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; }
    .page-header p { font-size: 0.82rem; color: var(--text-muted); margin-top: 5px; }

    /* ── METRICS ── */
    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .metric-card { background: var(--navy); border: 1px solid var(--border-light); padding: 1.3rem 1.5rem; }
    .metric-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
    .metric-value { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 700; color: var(--gold); margin-top: 4px; line-height: 1; }

    /* ── CARDS ── */
    .card { background: var(--navy); border: 1px solid var(--border-light); padding: 1.4rem; margin-bottom: 1rem; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .msg-name { font-weight: 500; font-size: 0.92rem; }
    .msg-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .msg-subject { font-size: 0.83rem; color: var(--text); margin-top: 5px; }
    .msg-body { font-size: 0.82rem; line-height: 1.65; color: var(--text-muted); margin-top: 0.75rem; border-top: 1px solid var(--border-light); padding-top: 0.75rem; }
    .card-actions { margin-top: 1rem; display: flex; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }
    .action-btn { padding: 6px 14px; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--border-light); background: transparent; color: var(--text-muted); transition: all 0.2s; }
    .action-btn:hover { border-color: var(--gold); color: var(--gold); }
    .action-btn.danger:hover { border-color: #f44336; color: #f44336; }

    /* ── BADGES ── */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 3px; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.05em; }
    .badge.unread { background: rgba(201,168,76,0.12); color: var(--gold); }
    .badge.read { background: rgba(139,164,191,0.12); color: var(--slate); }
    .badge.replied { background: rgba(76,175,80,0.12); color: #4CAF50; }
    .badge.draft { background: rgba(201,168,76,0.12); color: var(--gold); }

    /* ── SOCIAL ── */
    .platform-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .platform-card { background: var(--navy); border: 1px solid var(--border-light); padding: 1.4rem 1.5rem; display: flex; align-items: center; gap: 1rem; transition: border-color 0.2s; }
    .platform-card:hover { border-color: var(--border); }
    .platform-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .platform-info { flex: 1; min-width: 0; }
    .platform-name { font-weight: 500; font-size: 0.9rem; }
    .platform-handle { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .platform-caps { display: flex; gap: 5px; margin-top: 6px; }
    .cap-pill { font-size: 0.62rem; padding: 2px 7px; border: 1px solid; border-radius: 2px; }
    .cap-pill.publish { border-color: rgba(76,175,80,0.4); color: #4CAF50; }
    .cap-pill.boost { border-color: var(--border); color: var(--gold); }
    .connect-btn { padding: 8px 16px; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
    .connect-btn.connected { border-color: rgba(76,175,80,0.5); color: #4CAF50; background: rgba(76,175,80,0.06); }
    .connect-btn.connect { border-color: var(--gold); color: var(--gold); background: transparent; }
    .connect-btn.connect:hover { background: rgba(201,168,76,0.08); }

    /* ── CONTENT CREATOR ── */
    .content-creator { display: grid; grid-template-columns: 1fr 1.2fr; gap: 1.5rem; }
    .ai-panel { background: var(--navy); border: 1px solid var(--border-light); padding: 1.5rem; }
    .ai-panel h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; margin-bottom: 1.25rem; }
    .prompt-area { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); padding: 12px; color: var(--text); font-size: 0.85rem; resize: none; outline: none; height: 100px; transition: border-color 0.2s; }
    .prompt-area:focus { border-color: var(--gold); }
    .select-field { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); padding: 10px 12px; color: var(--text); font-size: 0.85rem; outline: none; margin-bottom: 1rem; appearance: none; }
    .select-field option { background: var(--navy-mid); }
    .platform-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 0.75rem 0 1.1rem; }
    .check-item { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--text-muted); cursor: pointer; padding: 7px 10px; border: 1px solid var(--border-light); transition: all 0.2s; user-select: none; }
    .check-item:hover { border-color: var(--border); color: var(--text); }
    .check-item.checked { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }
    .output-panel { background: var(--navy); border: 1px solid var(--border-light); padding: 1.5rem; }
    .output-panel h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; margin-bottom: 1.25rem; }
    .content-output { background: rgba(255,255,255,0.02); border: 1px solid var(--border-light); padding: 1rem; min-height: 160px; font-size: 0.83rem; line-height: 1.75; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }
    .platform-label { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; font-size: 0.72rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }
    .output-actions { display: flex; gap: 6px; margin-top: 7px; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.88rem; }
    .empty-icon { font-size: 2rem; margin-bottom: 0.75rem; }

    /* ── TABS ── */
    .tabs { display: flex; border-bottom: 1px solid var(--border-light); margin-bottom: 1.75rem; }
    .tab { padding: 10px 20px; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── DRAFTS ── */
    .post-item { background: var(--navy); border: 1px solid var(--border-light); padding: 1.2rem 1.4rem; margin-bottom: 0.75rem; }
    .post-meta { display: flex; justify-content: space-between; align-items: flex-start; }
    .post-title { font-weight: 500; font-size: 0.88rem; }
    .post-date { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }
    .post-platforms { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .platform-pill { padding: 2px 9px; font-size: 0.62rem; background: rgba(201,168,76,0.08); color: var(--gold); border: 1px solid var(--border); }

const SUPABASE_URL     = "https://your-project.supabase.co";
const SUPABASE_ANON_KEY = "your-anon-key-here";
// For the AI Content Creator, Claude API calls go through Anthropic's
// endpoint. In production add your key via a backend proxy.
const ANTHROPIC_API_KEY = ""; // leave blank when using claude.ai artifacts

/* ═══════════════════════════════════════════════════
   SUPABASE MINI-CLIENT
   ═══════════════════════════════════════════════════ */
const supabase = {
  async query(table, method = "GET", body = null, filter = "") {
    const url = `${SUPABASE_URL}/rest/v1/${table}${filter}`;
    const res = await fetch(url, {
      method,
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        Prefer: method === "POST" ? "return=representation" : "",
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!res.ok) throw new Error(await res.text());
    return method === "DELETE" ? null : res.json();
  },
  from(table) {
    return {
      select: (cols = "*") => supabase.query(table, "GET", null, `?select=${cols}&order=created_at.desc`),
      insert: (data)       => supabase.query(table, "POST", data),
      update: (data, id)   => supabase.query(table, "PATCH", data, `?id=eq.${id}`),
      delete: (id)         => supabase.query(table, "DELETE", null, `?id=eq.${id}`),
    };
  },
};

/* ═══════════════════════════════════════════════════
   CLAUDE AI HELPER
   ═══════════════════════════════════════════════════ */
async function generateContent(userPrompt, systemPrompt) {
  const headers = { "Content-Type": "application/json" };
  if (ANTHROPIC_API_KEY) {
    headers["x-api-key"] = ANTHROPIC_API_KEY;
    headers["anthropic-version"] = "2023-06-01";
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || "";
}

            <input required value={creds.username} onChange={e=>setCreds(p=>({...p,username:e.target.value}))} placeholder="admin" autoComplete="username"/>
          </div>
          <div className="form-group">
            <label>Password</label>
            <input required type="password" value={creds.password} onChange={e=>setCreds(p=>({...p,password:e.target.value}))} placeholder="••••••••" autoComplete="current-password"/>
          </div>
          {err && <p style={{ color:"#f44336", fontSize:"0.8rem", marginBottom:"1rem", lineHeight:1.5 }}>{err}</p>}
          <button className="btn-primary" type="submit" disabled={loading} style={{ width:"100%", justifyContent:"center" }}>
            {loading && <span className="spinner"/>}
            {loading ? "Verifying..." : "Access Dashboard"}
          </button>
          <button type="button" onClick={onBack} style={{ width:"100%", marginTop:"0.75rem", background:"transparent", border:"none", color:"var(--text-muted)", fontSize:"0.8rem", cursor:"pointer", padding:"8px" }}>← Back to website</button>
        </form>
      </div>
    </div>
  );
} import { useEffect, useRef, useState } from "react";

function StatItem({ num, label }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setVisible(true); },
      { threshold: 0.3 }
    );
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, []);

  return (
    <div
      className="stat-item"
      ref={ref}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(24px)",
        transition: "opacity 0.6s ease, transform 0.6s ease",
      }}
    >
      <div className="stat-num">{num}</div>
      <div className="stat-label">{label}</div>
    </div>
  );
}

  const [generated, setGenerated] = useState({});
  const [generating, setGenerating] = useState(false);

  useEffect(() => {
    if (tab === "messages") loadMessages();
    if (tab === "content") loadPosts();
  }, [tab]);

  async function loadMessages() {
    setLoadingMsgs(true);
    try { const data = await supabase.from("messages").select("*"); setMessages(Array.isArray(data)?data:[]); }
    catch { setMessages(MOCK_MESSAGES); }
    finally { setLoadingMsgs(false); }
  }

  async function loadPosts() {
    try { const data = await supabase.from("content_posts").select("*"); setPosts(Array.isArray(data)?data:[]); }
    catch { setPosts([]); }
  }

  function showToast(msg, type="success") { setToast({msg,type}); setTimeout(()=>setToast(null),3200); }

  async function markMsg(id, status) {
    try { await supabase.from("messages").update({status}, id); } catch {}
    setMessages(p => p.map(m => m.id===id ? {...m,status} : m));
    showToast(`Marked as ${status}`);
  }

  async function deleteMsg(id) {
    if (!confirm("Delete this message?")) return;
    try { await supabase.from("messages").delete(id); } catch {}
    setMessages(p => p.filter(m => m.id!==id));
    showToast("Message deleted");
  }

  function togglePlatform(id) {
    setSelPlatforms(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);
  }

  function connectPlatform(id) {
    const handle = prompt(`Enter your ${id} page handle or page URL (e.g. TenyaSecurityGroup):`);
    if (handle) {
      setPlatforms(p => p.map(pl => pl.id===id ? {...pl,connected:true,handle} : pl));
      showToast(`${id} connected successfully!`);
    }
  }

  function disconnectPlatform(id) {
    if (!confirm(`Disconnect ${id}?`)) return;
    setPlatforms(p => p.map(pl => pl.id===id ? {...pl,connected:false,handle:""} : pl));

            )}
          </>
        )}
      </main>

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ROOT APP
   ═══════════════════════════════════════════════════ */
function App() {
  const [view, setView] = useState("website");

  useEffect(() => {
    const loader = document.getElementById("app-loader");
    if (loader) {
      loader.style.opacity = "0";
      setTimeout(() => loader.style.display="none", 500);
    }
  }, []);

  return (
    <>
      {view==="website" && <PublicWebsite onAdminClick={()=>setView("login")}/>}
      {view==="login"   && <AdminLogin onLogin={()=>setView("admin")} onBack={()=>setView("website")}/>}
      {view==="admin"   && <AdminDashboard onLogout={()=>setView("website")}/>}
    </>
  );
}

const container = document.getElementById("root");
const reactRoot = ReactDOM.createRoot(container);
reactRoot.render(<App/>);
</script>
</body>
